version: '3.8'

services:
  flora-mcp-server:
    build: .
    container_name: flora-mcp-server
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      - NODE_ENV=production
      - PORT=4005
      - MONGODB_URI=${MONGODB_URI}
      - MONOLITH_API_URL=${MONOLITH_API_URL}
      - COMMAND_CENTER_API_URL=${COMMAND_CENTER_API_URL}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MCP_API_KEY_PREFIX=flora_mcp_
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
    volumes:
      - ./logs:/app/logs
    networks:
      - flora-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4005/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  flora-network:
    external: true
